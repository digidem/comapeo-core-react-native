name: Run BrowserStack Maestro Tests

description: Triggers a BrowserStack Maestro build, polls until completion, and retries infra-class flakes

inputs:
  platform:
    description: Platform to run tests on (android or ios)
    required: true
  app_url:
    description: BrowserStack app URL (bs://...)
    required: true
  test_suite_url:
    description: BrowserStack test suite URL (bs://...)
    required: true
  devices:
    description: JSON array of device strings
    required: true
  browserstack_project:
    description: BrowserStack project
    required: true
  browserstack_username:
    description: BrowserStack username
    required: true
  browserstack_access_key:
    description: BrowserStack access key
    required: true
  timeout:
    description: Per-attempt test run timeout in seconds
    required: false
    default: "600"
  max_attempts:
    description: >-
      Max build attempts. A failed build is only re-triggered when every
      failed session is an infra-class flake (e.g. the device driver
      connection resetting during launchApp), never on a real test failure.
    required: false
    default: "3"

runs:
  using: composite
  steps:
    - name: Validate inputs
      env:
        PLATFORM: ${{ inputs.platform }}
        TIMEOUT: ${{ fromJson(inputs.timeout) }}
        MAX_ATTEMPTS: ${{ fromJson(inputs.max_attempts) }}
      shell: bash
      run: |
        if [[ "$PLATFORM" != "android" && "$PLATFORM" != "ios" ]]; then
          echo "platform must be android or ios"
          exit 1
        fi

        if [[ "$TIMEOUT" -lt 30 ]]; then
          echo "timeout must be at least 30 seconds"
          exit 1
        fi

        if [[ "$MAX_ATTEMPTS" -lt 1 ]]; then
          echo "max_attempts must be at least 1"
          exit 1
        fi

    - name: Run tests
      id: run
      env:
        APP_URL: ${{ inputs.app_url }}
        TEST_SUITE_URL: ${{ inputs.test_suite_url }}
        DEVICES: ${{ inputs.devices }}
        BROWSERSTACK_PROJECT: ${{ inputs.browserstack_project }}
        BROWSERSTACK_USERNAME: ${{ inputs.browserstack_username }}
        BROWSERSTACK_ACCESS_KEY: ${{ inputs.browserstack_access_key }}
        PLATFORM: ${{ inputs.platform }}
        TIMEOUT: ${{ fromJson(inputs.timeout) }}
        MAX_ATTEMPTS: ${{ fromJson(inputs.max_attempts) }}
      shell: bash
      run: |
        set -o pipefail

        API="https://api-cloud.browserstack.com/app-automate/maestro/v2"
        AUTH="$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY"
        POLL_INTERVAL=30

        # Failures originating in the BrowserStack/Maestro harness (device
        # driver transport, app install/launch, XCUITest/WebDriverAgent)
        # rather than an in-app assertion. These are environment flakes —
        # the same build passes on a retry and on the other device. The
        # archetype is the XCTest driver connection resetting during the
        # implicit setPermissions of `launchApp`.
        INFRA_RE='Unable to set permissions|Connection reset|Connection refused|ECONNRESET|SocketException|Socket closed|SocketTimeout|Unable to launch app|Unable to clear state|Failed to install app|WebDriverAgent|XCTestDriverClient|xcuitest'

        # Session-start failures that BrowserStack surfaces in the session's
        # structured `error.message` rather than the Maestro log: the device
        # session never came up, so the Maestro log holds only boilerplate
        # system info and matches no INFRA_RE pattern. BrowserStack's own
        # message tells you to "run the test again" — i.e. it's a flake.
        SESSION_ERR_RE='Could not start a session|Something went wrong during test execution|Please try to run the test again|Device failed to start|Failed to start the session'

        PAYLOAD=$(jq -n \
          --arg app "$APP_URL" \
          --arg suite "$TEST_SUITE_URL" \
          --argjson devices "$DEVICES" \
          --arg project "$BROWSERSTACK_PROJECT" \
          '{
            app: $app,
            testSuite: $suite,
            devices: $devices,
            project: $project,
            deviceLogs: true,
            maestroVersion: "latest"
          }'
        )

        # Trigger a build; echoes only the build id on stdout (diagnostics
        # go to stderr) so it can be captured via command substitution.
        trigger_build() {
          local response http_code body build_id
          # Capture body and status separately: BrowserStack returns a
          # JSON `message` (e.g. queue/parallel-limit errors) that
          # `--fail` would discard, leaving only an opaque exit code.
          response=$(curl --show-error -sS -w '\n%{http_code}' \
            -u "$AUTH" \
            -X POST "$API/$PLATFORM/build" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          http_code=$(printf '%s' "$response" | tail -n1)
          body=$(printf '%s' "$response" | sed '$d')

          if [ "$http_code" -ge 400 ]; then
            echo "BrowserStack build trigger failed (HTTP $http_code): $body" >&2
            return 1
          fi

          build_id=$(printf '%s' "$body" | jq -r '.build_id // empty')
          if [ -z "$build_id" ]; then
            echo "BrowserStack build trigger returned no build_id (HTTP $http_code): $body" >&2
            return 1
          fi

          printf '%s' "$build_id"
        }

        # Poll a build until it reaches a terminal state. Sets BUILD_RESPONSE
        # and STATUS; returns 0 only on pass.
        poll_build() {
          local build_id=$1 elapsed=0
          while [ "$elapsed" -lt "$TIMEOUT" ]; do
            BUILD_RESPONSE=$(curl --fail --show-error -s -u "$AUTH" "$API/builds/$build_id")
            STATUS=$(echo "$BUILD_RESPONSE" | jq -r '.status')
            echo "[${elapsed}s] Build $build_id status: $STATUS"
            case "$STATUS" in
              passed|completed) return 0 ;;
              failed|error|timedout) return 1 ;;
            esac
            sleep "$POLL_INTERVAL"
            elapsed=$((elapsed + POLL_INTERVAL))
          done
          STATUS=timedout
          echo "Timed out after ${TIMEOUT}s waiting for build $build_id"
          return 1
        }

        # Dump the per-device/session report plus the tail of each failed
        # session's Maestro log, so the actual failure (assertion or infra
        # error) is visible in the CI log instead of a bare "Tests failed".
        report_failure() {
          local build_id=$1 detail
          echo "::group::BrowserStack build report ($build_id)"
          printf '%s\n' "$BUILD_RESPONSE" | jq '.' || printf '%s\n' "$BUILD_RESPONSE"
          printf '%s\n' "$BUILD_RESPONSE" \
            | jq -r '.devices[]? | "device=\(.device // .os) status=\(.status) session=\(.sessions[]?.id // "?")"' \
            || true
          echo "::endgroup::"
          for session_id in $(printf '%s\n' "$BUILD_RESPONSE" \
            | jq -r '.devices[]?.sessions[]? | select(.status != "passed") | .id'); do
            echo "::group::Session $session_id"
            detail=$(curl --show-error -s -u "$AUTH" "$API/builds/$build_id/sessions/$session_id")
            printf '%s\n' "$detail" | jq '.' || true
            for log_url in $(printf '%s\n' "$detail" | jq -r '.. | .maestro_log? // empty'); do
              echo "--- maestro log (tail): $log_url ---"
              curl --show-error -s -u "$AUTH" "$log_url" | tail -n 60 || true
            done
            echo "::endgroup::"
          done
        }

        # Returns 0 only if there is at least one failed session and every
        # failed session is infra-class: either its structured session
        # `error.message` matches SESSION_ERR_RE (the session never started)
        # or its Maestro log matches INFRA_RE. Any failed session matching
        # neither is treated as a real failure (return 1) so genuine
        # regressions are never retried away. A failed session whose log
        # can't be fetched also counts as real (fail safe).
        is_infra_only() {
          local build_id=$1 saw_failure=0 detail log session_infra err_msg
          for session_id in $(printf '%s\n' "$BUILD_RESPONSE" \
            | jq -r '.devices[]?.sessions[]? | select(.status != "passed") | .id'); do
            saw_failure=1
            detail=$(curl --show-error -s -u "$AUTH" "$API/builds/$build_id/sessions/$session_id")
            session_infra=0

            # Session-level error (e.g. "Could not start a session"): the
            # session never ran, so there's no telling Maestro log to grep.
            err_msg=$(printf '%s' "$detail" | jq -r '.error.message // empty')
            if [ -n "$err_msg" ] && printf '%s' "$err_msg" | grep -qiE "$SESSION_ERR_RE"; then
              session_infra=1
            fi

            for log_url in $(printf '%s\n' "$detail" | jq -r '.. | .maestro_log? // empty'); do
              log=$(curl --show-error -s -u "$AUTH" "$log_url")
              if printf '%s' "$log" | grep -qiE "$INFRA_RE"; then
                session_infra=1
              fi
            done
            if [ "$session_infra" -ne 1 ]; then
              echo "Session $session_id has no infra signature — treating build as a real failure." >&2
              return 1
            fi
          done
          [ "$saw_failure" -eq 1 ]
        }

        for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
          echo "::group::Attempt $attempt/$MAX_ATTEMPTS — triggering BrowserStack build"
          BUILD_ID=$(trigger_build)
          trigger_rc=$?
          echo "::endgroup::"
          if [ "$trigger_rc" -ne 0 ] || [ -z "$BUILD_ID" ]; then
            exit 1
          fi
          echo "Triggered build: $BUILD_ID"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"

          if poll_build "$BUILD_ID"; then
            echo "Tests passed"
            exit 0
          fi

          report_failure "$BUILD_ID"

          if [ "$attempt" -lt "$MAX_ATTEMPTS" ] && is_infra_only "$BUILD_ID"; then
            echo "::warning::Build $BUILD_ID failed with an infra-class flake (status: $STATUS); retrying (next attempt $((attempt + 1))/$MAX_ATTEMPTS)"
            continue
          fi

          echo "Tests failed (status: $STATUS)"
          exit 1
        done

        exit 1

    - name: Stop BrowserStack build on cancel
      if: cancelled() && steps.run.outputs.build_id != ''
      env:
        BUILD_ID: ${{ steps.run.outputs.build_id }}
        BROWSERSTACK_USERNAME: ${{ inputs.browserstack_username }}
        BROWSERSTACK_ACCESS_KEY: ${{ inputs.browserstack_access_key }}
      shell: bash
      run: |
        [[ "$BUILD_ID" == "null" ]] && exit 0
        echo "Stopping BrowserStack build $BUILD_ID"
        curl --show-error -s -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
          -X POST "https://api-cloud.browserstack.com/app-automate/maestro/builds/$BUILD_ID/stop" \
          -H "Content-Type: application/json" || true
