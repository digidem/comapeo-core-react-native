version: 2
updates:
  # Root + native/backend packages. These gate the shipped library and are
  # merged on a different cadence than the example/e2e apps, so they get their
  # own grouped PR (see the apps/ entry below).
  - package-ecosystem: npm
    directories:
      - "/"
      - "/backend"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    # Never adopt a release younger than 72h. A freshly published version is the
    # window in which a compromised or broken release is live but not yet yanked;
    # waiting it out trades 3 days of latency (incl. on security patches) for that
    # safety. Applies to every update type via default-days.
    cooldown:
      default-days: 3
    # `chore(deps)` / `chore(deps-dev)` so titles pass pr-title.yml and the
    # `deps` scope maps to the `dependencies` changelog label.
    commit-message:
      prefix: chore
      include: scope
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Majors are done by hand. We target Node 18 to match nodejs-mobile, so
      # several deps can't move to their latest major (e.g. @types/node stays
      # on 18.x); and a batched major PR we're not ready for is just noise.
      # Security updates still come through regardless of this rule.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # React Native and Expo are version-coupled and gate the whole toolchain;
      # a RN 0.85 -> 0.86 bump is a "minor" in semver but effectively a major
      # upgrade. Take patch fixes only and do minor/SDK bumps deliberately.
      - dependency-name: "react-native"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "expo"
        update-types: ["version-update:semver-minor"]

  # Example + e2e apps. Lower merge priority than the root package, so kept in a
  # separate grouped PR.
  - package-ecosystem: npm
    directories:
      - "/apps/integration"
      - "/apps/e2e"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
    commit-message:
      prefix: chore
      include: scope
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-native"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "expo"
        update-types: ["version-update:semver-minor"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 3
    commit-message:
      prefix: ci
      include: scope
    groups:
      # All action bumps (incl. majors) in one PR — action majors are low-risk
      # and reviewed together, so there's no reason to split them.
      actions:
        patterns:
          - "*"
