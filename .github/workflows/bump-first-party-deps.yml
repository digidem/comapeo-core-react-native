name: Bump first-party dep

# Receiver for the first-party-release dispatch fired by our upstream repos when
# they publish. The bump + rolling-PR logic lives in the shared reusable workflow;
# this forwards the package name and fans out over our two package trees (root +
# backend). Dependabot (cooldown-exempt, daily) is the fallback if a dispatch is
# ever missed.
on:
  repository_dispatch:
    types: [first-party-release]
  workflow_dispatch:
    inputs:
      package:
        description: "Package to bump (e.g. @comapeo/core)"
        required: true

jobs:
  bump:
    strategy:
      matrix:
        path: [".", "backend"]
    uses: digidem/actions-bump-first-party-dep/.github/workflows/bump.yml@v1
    with:
      package: ${{ github.event.client_payload.package || inputs.package }}
      path: ${{ matrix.path }}
    secrets:
      PR_BOT_PRIVATE_KEY: ${{ secrets.PR_BOT_PRIVATE_KEY }}
