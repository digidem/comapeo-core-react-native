name: Android Tests

# Runs on PRs (pre-merge feedback) and in the merge queue (merge_group),
# which is the gate before a PR lands. No secrets here, so it's safe on
# fork/Dependabot PRs too.
on:
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODEJS_MOBILE_VERSION: v18.20.4

jobs:
  unit-tests:
    name: JVM Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Cache nodejs-mobile binaries
        id: cache-libnode
        uses: actions/cache@v5
        with:
          path: android/libnode
          # hashFiles(...) folds the BASE_URL (defined inside the
          # download script) into the cache key, so any swap of the
          # source repo automatically invalidates stale caches.
          key: nodejs-mobile-${{ env.NODEJS_MOBILE_VERSION }}-android-${{ hashFiles('scripts/download-nodejs-mobile.sh') }}

      - name: Download nodejs-mobile binaries
        if: steps.cache-libnode.outputs.cache-hit != 'true'
        run: ./scripts/download-nodejs-mobile.sh

      # strict-allow-scripts (skip dependency install scripts via the committed
      # allowlists) requires npm >= 11.16; the runner image ships an older 11.x.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install npm dependencies
        run: npm install && cd apps/integration && npm install

      - name: Expo prebuild (generates apps/integration/android)
        run: cd apps/integration && npx expo prebuild --platform android --no-install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Run JVM unit tests
        run: |
          cd apps/integration/android
          ./gradlew :comapeo-core-react-native:testDebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: |
            android/build/reports/tests/
            android/build/test-results/

  instrumented-tests:
    name: Instrumented Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      matrix:
        api-level: [30]

    steps:
      - uses: actions/checkout@v7

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          tool-cache: false
          swap-storage: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Clean up unused SDK components
        run: |
          # Remove pre-installed NDKs (~1-2GB each) — Gradle auto-installs what it needs
          rm -rf "$ANDROID_HOME/ndk"
          # Remove unused platform versions
          for dir in "$ANDROID_HOME/platforms"/*/; do
            plat=$(basename "$dir")
            case "$plat" in
              android-34|android-${{ matrix.api-level }}) ;; # keep what we need
              *) echo "Removing unused platform $plat"; rm -rf "$dir" ;;
            esac
          done
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache nodejs-mobile binaries
        id: cache-libnode
        uses: actions/cache@v5
        with:
          path: android/libnode
          # hashFiles(...) folds the BASE_URL (defined inside the
          # download script) into the cache key, so any swap of the
          # source repo automatically invalidates stale caches.
          key: nodejs-mobile-${{ env.NODEJS_MOBILE_VERSION }}-android-${{ hashFiles('scripts/download-nodejs-mobile.sh') }}

      - name: Download nodejs-mobile binaries
        if: steps.cache-libnode.outputs.cache-hit != 'true'
        run: ./scripts/download-nodejs-mobile.sh

      # strict-allow-scripts (skip dependency install scripts via the committed
      # allowlists) requires npm >= 11.16; the runner image ships an older 11.x.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install npm dependencies
        run: npm install && cd apps/integration && npm install

      - name: Build backend
        run: npm run backend:build

      - name: Expo prebuild (generates apps/integration/android)
        run: cd apps/integration && npx expo prebuild --platform android --no-install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build test APKs
        run: |
          cd apps/integration/android
          ./gradlew :comapeo-core-react-native:assembleDebugAndroidTest :app:assembleDebugAndroidTest --no-daemon -PreactNativeArchitectures=x86_64

      # Snapshot caching was tried but is not portable across GitHub
      # runner machines on this google_atd image: restored snapshots
      # boot but system_server is dead-on-arrival (DeadSystemException
      # on the first adb input call). Cold boot every run instead.

      - name: Run instrumented tests
        timeout-minutes: 15
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: ${{ matrix.api-level }}
          target: google_atd
          arch: x86_64
          force-avd-creation: false
          ram-size: 4096M
          emulator-options:
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim
          disable-animations: false
          script: |
            adb shell settings put global window_animation_scale 0.0
            adb shell settings put global transition_animation_scale 0.0
            adb shell settings put global animator_duration_scale 0.0
            # -i prints per-test STARTED/PASSED/FAILED so a hanging test is
            # identifiable
            cd apps/integration/android && ./gradlew :comapeo-core-react-native:connectedDebugAndroidTest :app:connectedDebugAndroidTest --no-daemon -i -PreactNativeArchitectures=x86_64

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-test-results-api${{ matrix.api-level }}
          path: |
            android/build/reports/androidTests/
            android/build/outputs/androidTest-results/
            apps/integration/android/app/build/reports/androidTests/
            apps/integration/android/app/build/outputs/androidTest-results/
