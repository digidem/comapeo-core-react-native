name: Android Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODEJS_MOBILE_VERSION: v18.20.4

jobs:
  unit-tests:
    name: JVM Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Cache nodejs-mobile binaries
        id: cache-libnode
        uses: actions/cache@v4
        with:
          path: android/libnode
          key: nodejs-mobile-${{ env.NODEJS_MOBILE_VERSION }}-android

      - name: Download nodejs-mobile binaries
        if: steps.cache-libnode.outputs.cache-hit != 'true'
        run: ./scripts/download-nodejs-mobile.sh

      - name: Install root dependencies
        run: npm install --ignore-scripts

      - name: Install example dependencies
        run: cd example && npm install --ignore-scripts

      - name: Generate Android project (expo prebuild)
        run: cd example && npx expo prebuild --platform android --no-install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper jar
        run: |
          # Generate wrapper in a temp dir to avoid compiling project plugins
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          gradle wrapper --gradle-version 8.13
          cp gradle/wrapper/gradle-wrapper.jar "$GITHUB_WORKSPACE/example/android/gradle/wrapper/"
          rm -rf "$TMPDIR"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Find library module name
        id: find-module
        run: |
          cd example/android
          # Discover the Expo-autolinked module name for our library
          MODULE_NAME=$(./gradlew projects --no-daemon 2>&1 | grep -oP "Project ':[^']*comapeo[^']*'" | head -1 | tr -d "'" | sed 's/Project //' || true)
          if [ -z "$MODULE_NAME" ]; then
            echo "Could not find comapeo module, listing all projects:"
            ./gradlew projects --no-daemon 2>&1 | grep "Project '" || true
            # Fall back to trying common patterns
            MODULE_NAME=":comapeo-core-react-native"
          fi
          echo "module=$MODULE_NAME" >> "$GITHUB_OUTPUT"
          echo "Found module: $MODULE_NAME"

      - name: Run JVM unit tests
        run: |
          cd example/android
          ./gradlew ${{ steps.find-module.outputs.module }}:testDebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            android/build/reports/tests/
            android/build/test-results/

  instrumented-tests:
    name: Instrumented Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      matrix:
        api-level: [34]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache nodejs-mobile binaries
        id: cache-libnode
        uses: actions/cache@v4
        with:
          path: android/libnode
          key: nodejs-mobile-${{ env.NODEJS_MOBILE_VERSION }}-android

      - name: Download nodejs-mobile binaries
        if: steps.cache-libnode.outputs.cache-hit != 'true'
        run: ./scripts/download-nodejs-mobile.sh

      - name: Install root dependencies
        run: npm install --ignore-scripts

      - name: Install example dependencies
        run: cd example && npm install --ignore-scripts

      - name: Generate Android project (expo prebuild)
        run: cd example && npx expo prebuild --platform android --no-install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper jar
        run: |
          # Generate wrapper in a temp dir to avoid compiling project plugins
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          gradle wrapper --gradle-version 8.13
          cp gradle/wrapper/gradle-wrapper.jar "$GITHUB_WORKSPACE/example/android/gradle/wrapper/"
          rm -rf "$TMPDIR"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Find library module name
        id: find-module
        run: |
          cd example/android
          MODULE_NAME=$(./gradlew projects --no-daemon 2>&1 | grep -oP "Project ':[^']*comapeo[^']*'" | head -1 | tr -d "'" | sed 's/Project //' || true)
          if [ -z "$MODULE_NAME" ]; then
            echo "Could not find comapeo module, listing all projects:"
            ./gradlew projects --no-daemon 2>&1 | grep "Project '" || true
            # Fall back to trying common patterns
            MODULE_NAME=":comapeo-core-react-native"
          fi
          echo "module=$MODULE_NAME" >> "$GITHUB_OUTPUT"
          echo "Found module: $MODULE_NAME"

      - name: Build test APKs
        run: |
          cd example/android
          ./gradlew ${{ steps.find-module.outputs.module }}:assembleDebugAndroidTest :app:assembleDebug --no-daemon

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: pixel_6
          heap-size: 512M
          ram-size: 4096M
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            cd example/android
            ./gradlew ${{ steps.find-module.outputs.module }}:connectedDebugAndroidTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results-api${{ matrix.api-level }}
          path: |
            android/build/reports/androidTests/
            android/build/outputs/androidTest-results/
