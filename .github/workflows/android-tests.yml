name: Android Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODEJS_MOBILE_VERSION: v18.20.4
  NDK_VERSION: '27.0.12077973'

jobs:
  unit-tests:
    name: JVM Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          if [ ! -d "$ANDROID_HOME/ndk/$NDK_VERSION" ]; then
            sdkmanager --install "ndk;$NDK_VERSION"
          fi

      - name: Cache nodejs-mobile binaries
        id: cache-libnode
        uses: actions/cache@v4
        with:
          path: android/libnode
          key: nodejs-mobile-${{ env.NODEJS_MOBILE_VERSION }}-android

      - name: Download nodejs-mobile binaries
        if: steps.cache-libnode.outputs.cache-hit != 'true'
        run: ./scripts/download-nodejs-mobile.sh

      - name: Install npm dependencies
        run: npm install --ignore-scripts

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM unit tests
        run: |
          cd example/android
          ./gradlew :comapeo-core-react-native:testDebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            android/build/reports/tests/
            android/build/test-results/

  instrumented-tests:
    name: Instrumented Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      matrix:
        api-level: [30]

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          tool-cache: false
          swap-storage: false

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and clean up unused SDK components
        run: |
          # Remove pre-installed NDKs we don't need (~1-2GB each)
          if [ -d "$ANDROID_HOME/ndk" ]; then
            for dir in "$ANDROID_HOME/ndk"/*/; do
              ndk_dir=$(basename "$dir")
              if [ "$ndk_dir" != "$NDK_VERSION" ]; then
                echo "Removing unused NDK $ndk_dir"
                rm -rf "$dir"
              fi
            done
          fi
          # Install the version we need if not already present
          if [ ! -d "$ANDROID_HOME/ndk/$NDK_VERSION" ]; then
            sdkmanager --install "ndk;$NDK_VERSION"
          fi
          # Remove unused platform versions to save space
          for dir in "$ANDROID_HOME/platforms"/*/; do
            plat=$(basename "$dir")
            case "$plat" in
              android-34|android-${{ matrix.api-level }}) ;; # keep what we need
              *) echo "Removing unused platform $plat"; rm -rf "$dir" ;;
            esac
          done
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache nodejs-mobile binaries
        id: cache-libnode
        uses: actions/cache@v4
        with:
          path: android/libnode
          key: nodejs-mobile-${{ env.NODEJS_MOBILE_VERSION }}-android

      - name: Download nodejs-mobile binaries
        if: steps.cache-libnode.outputs.cache-hit != 'true'
        run: ./scripts/download-nodejs-mobile.sh

      - name: Install npm dependencies
        run: npm install --ignore-scripts

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build test APKs
        run: |
          cd example/android
          ./gradlew :comapeo-core-react-native:assembleDebugAndroidTest :app:assembleDebugAndroidTest --no-daemon

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disk-size: 2048M
          heap-size: 512M
          ram-size: 4096M
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            cd example/android
            ./gradlew :comapeo-core-react-native:connectedDebugAndroidTest :app:connectedDebugAndroidTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results-api${{ matrix.api-level }}
          path: |
            android/build/reports/androidTests/
            android/build/outputs/androidTest-results/
            example/android/app/build/reports/androidTests/
            example/android/app/build/outputs/androidTest-results/
