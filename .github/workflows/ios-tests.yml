name: iOS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-tests:
    name: Swift Package Tests (macOS)
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      # The Swift Package test target (`ComapeoCore-Package`) builds only
      # platform-portable files (NodeJSIPC, NodeJSService, Log) and runs
      # against Unix sockets via Darwin APIs — all of which work on macOS
      # without a simulator. This is fast-feedback coverage for the framing,
      # IPC, service lifecycle, and waitForFile helpers.
      - name: Run package tests
        run: |
          cd ios
          swift test

  integration-tests:
    name: Integration Tests (Example App)
    # macos-15 because Expo 55 / RN 0.83's ExpoModulesCore hits a Swift 6.0.x
    # strict-actor-isolation regression on Xcode 16.2 ("Main actor-isolated
    # instance method ... cannot be used to satisfy nonisolated protocol
    # requirement"). Xcode 16.4 ships Swift 6.1 which relaxes that diagnostic
    # back to a warning. macos-14 caps at Xcode 16.2; macos-15 has 16.4.
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install && cd example && npm install

      - name: Download NodeMobile
        run: npm run download:nodejs-mobile -- --platform ios

      - name: Install Node.js project dependencies
        run: cd ios/nodejs-project && npm install --omit=dev

      - name: Expo prebuild
        run: cd example && npx expo prebuild --platform ios --no-install

      - name: Pod install
        run: cd example/ios && pod install

      - name: Run integration tests
        run: |
          cd example/ios
          xcodebuild test \
            -workspace corereactnativeexample.xcworkspace \
            -scheme corereactnativeexample \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED='NO'
