name: iOS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Swift Unit Tests (macOS)
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Run unit tests
        run: |
          cd ios
          swift test --filter "MessageFramingTests"

  simulator-tests:
    name: Integration Tests (iOS Simulator)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Discover xcodebuild schemes
        run: |
          cd ios
          xcodebuild -list

      - name: Run tests on iOS Simulator
        run: |
          set -o pipefail
          cd ios
          xcodebuild test \
            -scheme ComapeoCore-Package \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED='NO' \
            ENABLE_TESTABILITY='YES'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ios/.build/debug/ComapeoCoreTests.xctest/
          if-no-files-found: ignore

  integration-tests:
    name: Integration Tests (Example App)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install && cd example && npm install

      - name: Download NodeMobile
        run: npm run download:nodejs-mobile -- --platform ios

      - name: Install Node.js project dependencies
        run: cd ios/nodejs-project && npm install --omit=dev

      - name: Pod install
        run: cd example/ios && pod install

      - name: Run integration tests
        run: |
          cd example/ios
          xcodebuild test \
            -workspace corereactnativeexample.xcworkspace \
            -scheme corereactnativeexample \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED='NO'
