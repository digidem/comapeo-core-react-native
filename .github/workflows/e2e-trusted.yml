name: E2E Tests (trusted)

# Runs the full BrowserStack e2e on PRs that don't receive secrets by default
# (Dependabot and forks). Gated on a maintainer reviewing the diff — including a
# Socket.dev supply-chain report — and adding the `safe-to-test` label. The
# label is removed after each run, and also whenever new commits are pushed
# (synchronize), so an approval can never outlive the exact diff it covered.
#
# This builds the PR head SHA with secrets available, so the `safe-to-test`
# review MUST confirm the PR doesn't touch build/CI machinery (`.github/`,
# scripts, install-script allowlists). For Dependabot manifest/lockfile bumps
# that's automatic. The reusable workflow's steps come from the base branch and
# its secret-handling test jobs use the base composite action, so a PR can only
# influence what runs through the app build itself.

on:
  pull_request_target:
    types: [labeled, synchronize]

concurrency:
  group: e2e-trusted-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  e2e:
    if: github.event.action == 'labeled' && github.event.label.name == 'safe-to-test'
    permissions:
      contents: read
    uses: ./.github/workflows/e2e-reusable.yml
    with:
      ref: ${{ github.event.pull_request.head.sha }}
    secrets:
      BROWSERSTACK_USERNAME_TESTS: ${{ secrets.BROWSERSTACK_USERNAME_TESTS }}
      BROWSERSTACK_ACCESS_KEY_TESTS: ${{ secrets.BROWSERSTACK_ACCESS_KEY_TESTS }}

  remove-label:
    needs: [e2e]
    if: always() && github.event.action == 'labeled' && github.event.label.name == 'safe-to-test'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove safe-to-test label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --remove-label safe-to-test || true

  # New commits invalidate a prior approval: drop the label so the next run
  # needs a fresh review of the new code.
  reset-on-push:
    if: github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'safe-to-test')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove safe-to-test label on new commits
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --remove-label safe-to-test || true
