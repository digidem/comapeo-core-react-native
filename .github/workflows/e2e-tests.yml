name: E2E Tests

# Internal/trusted e2e. The merge queue (merge_group) is the real gate; on a
# PR it runs on demand for internal branches via the `safe-to-test` label
# (persists, re-runs on each push) or "Run workflow" (workflow_dispatch).
# Dependabot and fork PRs get no secrets here — they run through
# e2e-trusted.yml once a maintainer reviews the diff and adds `safe-to-test`.
on:
  merge_group:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [labeled, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  e2e:
    # merge_group / manual dispatch always run. On a PR, only internal branches
    # (secrets available) run here, and only when `safe-to-test` is present.
    # `||` short-circuits, so the PR-payload lookups are skipped on
    # merge_group/dispatch (where github.event.pull_request is null).
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'safe-to-test'))
    permissions:
      contents: read
    uses: ./.github/workflows/e2e-reusable.yml
    secrets:
      BROWSERSTACK_USERNAME_TESTS: ${{ secrets.BROWSERSTACK_USERNAME_TESTS }}
      BROWSERSTACK_ACCESS_KEY_TESTS: ${{ secrets.BROWSERSTACK_ACCESS_KEY_TESTS }}
