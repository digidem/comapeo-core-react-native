name: E2E Tests

# Internal/trusted e2e. The expensive build + device jobs run in the merge queue
# (merge_group) as the gate before a PR lands, plus on manual dispatch or on a PR
# carrying the `run-e2e` label. A plain PR defers the run to the queue — the
# `e2e / Gate` check still passes cheaply, so the PR stays mergeable without
# burning paid device time on every push. Dependabot and fork PRs get no secrets
# here — they run through e2e-trusted.yml once a maintainer reviews the diff and
# adds `safe-to-test`.
on:
  merge_group:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  e2e:
    # merge_group / manual dispatch always run. On a PR, only internal,
    # non-draft branches run here (secrets available); Dependabot and forks are
    # routed to e2e-trusted.yml. This PR-trust check must stay the logical
    # complement of e2e-trusted.yml's untrusted gate — keep the two in sync, or
    # e2e runs twice (or not at all) for some PR class. `||` short-circuits, so
    # the PR-payload lookups are skipped on merge_group/dispatch (pull_request null).
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      # Lets the reusable workflow's path-detection job list the PR's files.
      pull-requests: read
    uses: ./.github/workflows/e2e-reusable.yml
    secrets:
      BROWSERSTACK_USERNAME_TESTS: ${{ secrets.BROWSERSTACK_USERNAME_TESTS }}
      BROWSERSTACK_ACCESS_KEY_TESTS: ${{ secrets.BROWSERSTACK_ACCESS_KEY_TESTS }}
