name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  e2e:
    # Pushes to main and PRs from internal branches get the BrowserStack secrets
    # automatically. Dependabot and fork PRs don't — they run via e2e-trusted.yml
    # once a maintainer reviews the diff and adds the `safe-to-test` label.
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       github.actor != 'dependabot[bot]')
    permissions:
      contents: read
    uses: ./.github/workflows/e2e-reusable.yml
    secrets:
      BROWSERSTACK_USERNAME_TESTS: ${{ secrets.BROWSERSTACK_USERNAME_TESTS }}
      BROWSERSTACK_ACCESS_KEY_TESTS: ${{ secrets.BROWSERSTACK_ACCESS_KEY_TESTS }}
