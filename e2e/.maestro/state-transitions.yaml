appId: com.comapeo.core.example
---
# Test: State transitions happen in correct order
- launchApp

# The initial state should be visible
- assertVisible:
    id: "state-value"

# Should eventually show "started"
- extendedWaitUntil:
    visible:
      text: "started"
    timeout: 20000

# Then should reach "ready"
- extendedWaitUntil:
    visible:
      text: "ready"
    timeout: 30000
