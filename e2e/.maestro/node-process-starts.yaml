appId: com.comapeo.core.example
---
# Test: Node.js process starts and reaches "ready" state
- launchApp

# The state should transition through: starting → started → ready
# Wait up to 30 seconds for the Node.js process to become ready
- assertVisible:
    id: "state-value"

- extendedWaitUntil:
    visible:
      text: "ready"
    timeout: 30000
