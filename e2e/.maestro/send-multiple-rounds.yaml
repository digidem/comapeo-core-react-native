appId: com.comapeo.core.integration
---
# Test: Multiple rounds of IPC messaging work correctly
- launchApp

# Wait for ready state
- extendedWaitUntil:
    visible:
      text: "ready"
    timeout: 30000

# First round of messages
- tapOn:
    id: "send-button"

- extendedWaitUntil:
    visible:
      id: "benchmark-result"
    timeout: 60000

# Send a second round to verify the IPC channel stays healthy
- tapOn:
    id: "send-button"

# The benchmark result should update (still visible after second round)
- extendedWaitUntil:
    visible:
      id: "benchmark-result"
    timeout: 60000
