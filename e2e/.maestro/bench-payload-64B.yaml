appId: com.comapeo.core.benchmark
---
# Per-payload-size variant of bench-rpc.yaml: only 64B selected.
# Default selection is {64B, 1KB, 64KB}; deselect the two larger sizes
# so the run records 64B-only RTT distribution.

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: "service-state"
      text: "STARTED"
    timeout: 60000

- tapOn:
    id: "size-1024"
- tapOn:
    id: "size-65536"

- tapOn:
    id: "send-button"

- extendedWaitUntil:
    visible:
      id: "benchmark-result"
    timeout: 60000

- assertVisible:
    text: "64B"
