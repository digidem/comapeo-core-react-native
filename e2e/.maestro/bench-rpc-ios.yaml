appId: com.comapeo.core.benchmark
---
# iOS-flavoured variant of bench-rpc.yaml. Differs in two ways:
#
#   - Does NOT use `clearState: true` on launch — that triggers the
#     iOS dev-client URL scheme dialog ("Open in core-react-native-
#     benchmark?") which blocks the rest of the flow.
#   - Tolerates the same dialog appearing during launch by tapping
#     "Open" if it shows up before assertions.

- launchApp

- runFlow:
    when:
      visible:
        text: "Open"
    commands:
      - tapOn:
          text: "Open"

- extendedWaitUntil:
    visible:
      id: "service-state"
      text: "STARTED"
    timeout: 60000

- tapOn:
    id: "send-button"

- extendedWaitUntil:
    visible:
      id: "benchmark-result"
    timeout: 180000

- assertVisible:
    id: "benchmark-result"
- assertVisible:
    text: "p50"
- assertVisible:
    text: "p99"
