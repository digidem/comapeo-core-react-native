appId: com.comapeo.core.example
---
# Test: IPC round-trip messaging works (sends 1000 messages, receives echoes)
- launchApp

# Wait for Node.js to be ready before sending messages
- extendedWaitUntil:
    visible:
      text: "ready"
    timeout: 30000

# Tap Send to fire 1000 messages through the IPC channel
- tapOn:
    id: "send-button"

# Wait for all 1000 messages to echo back (up to 60 seconds)
- extendedWaitUntil:
    visible:
      id: "benchmark-result"
    timeout: 60000

# Verify the benchmark result text is correct
- assertVisible:
    text: "Received 1000 messages in .*"
