appId: com.comapeo.core.benchmark
---
# UDS / RPC bridge benchmark — bench app launches its own bench backend
# (`backend/index.bench.js`, embedded via the `bench` Android flavor /
# `ENV['COMAPEO_BENCH']` iOS opt-in), waits for the service to reach
# STARTED, runs a sweep across the default payload sizes, and reads back
# the on-screen p50/p95/p99 panel. Spans are also written to the app's
# documents directory; "Export results" opens the system share sheet.
#
# This flow is the primary BrowserStack App Automate entry point. For
# orchestrated runs that ship spans to a host-side `bench-receiver.ts`,
# tap the "POST spans" toggle before tapping "Run benchmark".

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: "service-state"
      text: "STARTED"
    timeout: 60000

- tapOn:
    id: "send-button"

- extendedWaitUntil:
    visible:
      id: "benchmark-result"
    timeout: 120000

- assertVisible:
    id: "benchmark-result"
- assertVisible:
    text: "p50"
- assertVisible:
    text: "p99"
