# Local dev-client variant of e2e.yaml (run on a simulator against a Metro dev
# server, not a standalone build). Differs from e2e.yaml only in the launch:
# no `clearState` (it would wipe the dev launcher's saved Metro URL). The
# "Run tests" / all-tests-* steps mirror e2e.yaml — keep them in sync if the
# in-app test harness changes.
#
# `launchApp` below takes no Metro URL: expo-dev-client's launchMode
# "most-recent" reconnects the app to whatever dev server it last used. So
# point it at the e2e Metro once per simulator (otherwise it may reconnect to
# another project's Metro and load the wrong bundle). Keep the port consistent
# across all three commands:
#
#   cd apps/e2e && npx expo start --port 8081                 # start the e2e Metro
#   xcrun simctl openurl booted \
#     "exp+core-react-native-e2e://expo-development-client/?url=http://localhost:8081"
#   # confirm the e2e screen loads, then:
#   maestro test maestro/e2e.local.yaml
appId: com.comapeo.core.e2e
env:
  TIMEOUT: 300000
---
- launchApp
# A plain launch (no clearState) opens straight to the app. The optional tap
# clears the Expo dev-menu onboarding overlay shown only on a fresh install.
- tapOn:
    text: "Continue"
    optional: true
- tapOn: "Run tests"
- extendedWaitUntil:
    visible:
      id: "all-tests-done"
    timeout: ${TIMEOUT}
- assertVisible:
    id: "all-tests-passed"
